<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- Cyan to violet brand gradient (matches gradient-primary in styles.css) -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- Soft glow filter for the icon -->
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon box: rounded square with gradient fill -->
  <g transform="translate(40, 50)">
    <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="url(#brandGradient)" filter="url(#iconGlow)"/>
    <!-- Lucide Rocket icon, scaled to fit the box (24×24 viewBox source) -->
    <g transform="translate(20, 20) scale(2.5)" stroke="#0a0a0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
      <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09"/>
      <path d="M9 12a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.4 22.4 0 0 1-4 2z"/>
      <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 .05 5 .05"/>
    </g>
  </g>

  <!-- Wordmark: "LaunchFly" white + ".io" gradient -->
  <text x="170" y="125"
        font-family="-apple-system, 'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="64"
        font-weight="700"
        letter-spacing="-1.5">
    <tspan fill="#ffffff">LaunchFly</tspan><tspan fill="url(#brandGradient)">.io</tspan>
  </text>
</svg>
